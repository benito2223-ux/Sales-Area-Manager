<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPK by CeramTec — Sales Area Manager</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Open+Sans+Condensed:wght@700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- SheetJS -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Open Sans',sans-serif;font-weight:400;color:#1a1a1a;background:#f4f6f9;}

/* ===== CSS VARIABLES ===== */
:root{
  --blue:#1B5EA6;--blue-hover:#154d8a;--blue-light:#2E6FAD;--blue-bg:#e8f0fb;
  --red:#E2001A;--green:#16a34a;--black:#1a1a1a;--white:#ffffff;
  --radius:3px;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.08);--shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --nav-h:52px;
}

/* ===== NAVBAR ===== */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  height:var(--nav-h);background:var(--white);
  border-bottom:3px solid var(--blue);
  box-shadow:0 2px 8px rgba(0,0,0,0.10);
  display:flex;align-items:center;padding:0 20px;
}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo-box{
  background:var(--blue);padding:2px 14px 4px;border-radius:var(--radius);
  position:relative;overflow:hidden;
}
.nav-logo-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--red);
}
.nav-logo-text{
  font-family:'Open Sans Condensed',sans-serif;font-weight:700;
  font-size:22px;color:var(--white);letter-spacing:2px;position:relative;z-index:1;
}
.nav-title{font-size:15px;font-weight:600;color:var(--blue);margin-left:8px;}

/* ===== MAIN LAYOUT ===== */
#main{display:flex;height:calc(100vh - var(--nav-h));margin-top:var(--nav-h);}

/* ===== SIDEBAR ===== */
#sidebar{
  width:25%;min-width:300px;max-width:380px;background:var(--white);
  border-right:2px solid var(--blue-bg);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  box-shadow:var(--shadow-sm);z-index:1000;
}
.sidebar-section{
  padding:16px 18px;border-top:4px solid var(--blue);
}
.sidebar-section h3{
  font-family:'Open Sans Condensed',sans-serif;font-weight:700;
  font-size:15px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-icon{width:18px;height:18px;fill:var(--blue);}

/* Search bar */
.search-wrap{padding:10px 18px;background:#f8f9fb;border-bottom:1px solid var(--blue-bg);position:relative;}
.search-wrap svg{position:absolute;left:27px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:#aaa;pointer-events:none;}
#search-input{
  width:100%;padding:7px 10px 7px 32px;border:1.5px solid #ddd;border-radius:var(--radius);
  font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--white);
}
#search-input:focus{border-color:var(--blue);}
#search-clear{
  position:absolute;right:26px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:15px;color:#aaa;display:none;
  line-height:1;
}

/* Filter chips */
.filter-group{margin-bottom:14px;}
.filter-group label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:6px;}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius);
  cursor:pointer;border:1.5px solid #ccc;background:var(--white);color:#555;
  transition:all .2s;user-select:none;
}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.chip.active-type{background:var(--blue);color:var(--white);border-color:var(--blue);}
.chip.active-size{background:var(--blue-light);color:var(--white);border-color:var(--blue-light);}
.chip .badge{
  display:inline-block;background:rgba(255,255,255,0.35);border-radius:50%;
  width:18px;height:18px;line-height:18px;text-align:center;font-size:10px;margin-left:4px;
}
.chip.active-type .badge,.chip.active-size .badge{background:rgba(255,255,255,0.5);color:var(--white);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:600;
  border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;
}
.btn-primary{background:var(--blue);color:var(--white);}
.btn-primary:hover{background:var(--blue-hover);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-danger:hover{background:#b8001a;}
.btn-success{background:var(--green);color:var(--white);}
.btn-success:hover{background:#15803d;}
.btn-outline{background:var(--white);color:var(--blue);border:1.5px solid var(--blue);}
.btn-outline:hover{background:var(--blue-bg);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-block{width:100%;justify-content:center;}
.btn svg{width:16px;height:16px;fill:currentColor;}

/* Upload areas */
.upload-zone{
  border:2px dashed #ccc;border-radius:var(--radius);padding:14px;text-align:center;
  margin-top:8px;cursor:pointer;transition:border-color .2s;position:relative;
}
.upload-zone:hover{border-color:var(--blue);}
.upload-zone.dragover{border-color:var(--blue);background:var(--blue-bg);}
.upload-zone input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.upload-zone p{font-size:12px;color:#777;margin-bottom:4px;}
.upload-zone .upload-hint{font-size:11px;color:#aaa;}

/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:13px;}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-weight:600;color:#555;}
.stat-value{font-weight:700;color:var(--black);}
.stat-value.blue{color:var(--blue);}
.stat-value.red{color:var(--red);}
.type-stat{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;}
.type-stat .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}

/* ===== MAP ===== */
#map-container{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* ===== CUSTOM MARKERS ===== */
.client-marker{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.client-marker:hover{transform:scale(1.15);box-shadow:0 4px 16px rgba(0,0,0,0.35);}
.client-marker svg{width:55%;height:55%;}
.client-marker.lead-marker{border:2.5px dashed;}
.client-marker.filled-marker{border:2px solid rgba(255,255,255,0.8);}

/* ===== LEAFLET POPUP OVERRIDES ===== */
.leaflet-popup-content-wrapper{
  border-radius:4px!important;
  box-shadow:var(--shadow-md)!important;
  border-top:4px solid var(--blue)!important;
  font-family:'Open Sans',sans-serif!important;
}
.leaflet-popup-tip{border-top-color:var(--white)!important;}
.leaflet-popup-content{margin:14px 16px!important;font-size:13px!important;line-height:1.6!important;}
.popup-header{
  font-family:'Open Sans Condensed',sans-serif;font-weight:700;font-size:16px;
  color:var(--blue);margin-bottom:2px;
}
.popup-sub{font-size:12px;color:#777;margin-bottom:6px;}
.popup-type{
  display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:var(--radius);color:var(--white);margin-bottom:8px;
}
.popup-ca{font-size:14px;font-weight:700;color:var(--black);margin:4px 0;}
.popup-ca-label{font-size:11px;color:#888;}
.popup-chart-container{position:relative;width:100%;max-width:280px;margin:10px auto 0;}

/* Popup action zone */
.popup-action-row{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid #eee;}
.popup-btn{
  flex:1;padding:5px 8px;font-size:11px;font-weight:600;border:none;border-radius:3px;
  cursor:pointer;transition:background .2s;font-family:inherit;
}
.popup-btn-edit{background:var(--blue-bg);color:var(--blue);}
.popup-btn-edit:hover{background:#d0e2f8;}
.popup-btn-delete{background:#fee2e2;color:var(--red);}
.popup-btn-delete:hover{background:#fecaca;}

/* Popup CA inline entry */
.popup-ca-entry{margin-top:8px;padding-top:8px;border-top:1px solid #eee;}
.popup-ca-entry-label{font-size:11px;font-weight:600;color:#555;margin-bottom:5px;}
.popup-ca-entry-row{display:flex;gap:6px;align-items:center;}
.popup-ca-entry input{
  width:110px;padding:5px 8px;border:1.5px solid #ddd;border-radius:3px;
  font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;
}
.popup-ca-entry input:focus{border-color:var(--blue);}

/* Popup notes */
.popup-notes{margin-top:8px;padding-top:8px;border-top:1px solid #eee;}
.popup-notes-label{font-size:11px;font-weight:600;color:#555;margin-bottom:4px;}
.popup-notes textarea{
  width:100%;height:66px;font-size:12px;font-family:'Open Sans',sans-serif;
  border:1.5px solid #ddd;border-radius:3px;padding:6px;resize:vertical;
  color:#333;line-height:1.5;outline:none;transition:border-color .2s;
}
.popup-notes textarea:focus{border-color:var(--blue);}
.popup-save-btn{
  margin-top:4px;padding:4px 14px;font-size:11px;font-weight:600;
  background:var(--blue);color:#fff;border:none;border-radius:3px;cursor:pointer;
  transition:background .2s;font-family:inherit;
}
.popup-save-btn:hover{background:var(--blue-hover);}
.popup-saved-msg{font-size:11px;color:var(--green);margin-left:8px;display:none;}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:20000;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--white);border-radius:6px;width:90%;max-width:560px;
  max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2);
  border-top:4px solid var(--blue);
}
.modal-header{
  padding:16px 22px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--white);z-index:1;
}
.modal-header h2{font-family:'Open Sans Condensed',sans-serif;font-size:18px;color:var(--blue);}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:none;background:#eee;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;color:#555;
}
.modal-close:hover{background:#ddd;}
.modal-body{padding:20px 22px;}

/* Form styles */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.form-col-2{grid-column:span 2;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select,.form-group textarea{
  padding:8px 10px;border:1.5px solid #ddd;border-radius:var(--radius);
  font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;color:#1a1a1a;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);}
.form-group input.field-error{border-color:var(--red);}
.form-footer{display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #eee;padding-top:16px;margin-top:4px;align-items:center;}
.geocode-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
#geocode-status{font-size:12px;color:#888;}

/* ===== CLUSTER OVERRIDE ===== */
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{
  background-color:rgba(27,94,166,0.2)!important;
}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{
  background-color:rgba(27,94,166,0.7)!important;
  color:#fff!important;font-weight:700!important;font-size:12px!important;
  font-family:'Open Sans',sans-serif!important;
}

/* ===== RESPONSIVE TWEAKS ===== */
.leaflet-control-zoom a{color:var(--blue)!important;}

/* ===== SCROLLBAR ===== */
#sidebar::-webkit-scrollbar{width:6px;}
#sidebar::-webkit-scrollbar-track{background:#f1f1f1;}
#sidebar::-webkit-scrollbar-thumb{background:var(--blue-light);border-radius:3px;}

/* ===== TOAST ===== */
.toast-container{position:fixed;top:70px;right:20px;z-index:30000;}
.toast{
  background:var(--black);color:var(--white);padding:12px 20px;border-radius:var(--radius);
  margin-bottom:8px;font-size:13px;font-weight:600;box-shadow:var(--shadow-md);
  animation:slideIn .3s ease;
}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

/* ===== LOADING SPINNER ===== */
.spinner{
  width:16px;height:16px;border:2px solid var(--blue-bg);border-top-color:var(--blue);
  border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ==================== NAVBAR ==================== -->
<nav id="navbar">
  <div class="nav-brand">
    <div class="nav-logo-box"><span class="nav-logo-text">SPK</span></div>
    <span class="nav-title">Sales Area Manager</span>
  </div>
</nav>

<!-- ==================== MAIN LAYOUT ==================== -->
<div id="main">

  <!-- ===== SIDEBAR ===== -->
  <div id="sidebar">

    <!-- Logo + Nouveau client -->
    <div style="text-align:center;padding:16px 18px 12px;border-bottom:3px solid var(--blue-bg);">
      <div style="display:inline-block;background:var(--blue);padding:6px 24px 8px;position:relative;border-radius:var(--radius);">
        <div style="position:absolute;top:0;left:0;right:0;height:4px;background:var(--red);border-radius:var(--radius) var(--radius) 0 0;"></div>
        <span style="font-family:'Open Sans Condensed',sans-serif;font-weight:700;font-size:28px;color:var(--white);letter-spacing:3px;position:relative;">SPK</span>
      </div>
      <p style="font-size:11px;color:#888;margin-top:6px;">by CeramTec</p>
      <button class="btn btn-primary btn-block" id="btn-add-client" style="margin-top:10px;font-size:12px;padding:7px 12px;">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Nouveau Client
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un client, ville…"/>
      <button id="search-clear">×</button>
    </div>

    <!-- Filters -->
    <div class="sidebar-section">
      <h3>
        <svg class="section-icon" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
        Filtres
      </h3>
      <div class="filter-group">
        <label>Type de client</label>
        <div class="filter-chips" id="type-filters"></div>
      </div>
      <div class="filter-group" style="margin-bottom:0;">
        <label>Taille CA</label>
        <div class="filter-chips" id="size-filters"></div>
      </div>
    </div>

    <!-- Import -->
    <div class="sidebar-section">
      <h3>
        <svg class="section-icon" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        Import XLS
      </h3>
      <button class="btn btn-outline btn-block btn-sm" id="btn-tpl-clients" style="margin-bottom:6px;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2 5 5h-5V4zM8 17h8v-2H8v2zm0-4h8v-2H8v2z"/></svg>
        Template Base Clients
      </button>
      <button class="btn btn-outline btn-block btn-sm" id="btn-tpl-ca" style="margin-bottom:6px;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2 5 5h-5V4zM8 17h8v-2H8v2zm0-4h8v-2H8v2z"/></svg>
        Template CA Mensuel
      </button>
      <div class="upload-zone" id="upload-clients">
        <p><strong>Base Clients</strong></p>
        <p class="upload-hint">.xlsx / .xls</p>
        <input type="file" accept=".xlsx,.xls" id="file-clients"/>
      </div>
      <div class="upload-zone" id="upload-ca" style="margin-top:6px;">
        <p><strong>CA Mensuel</strong></p>
        <p class="upload-hint">.xlsx / .xls</p>
        <input type="file" accept=".xlsx,.xls" id="file-ca"/>
      </div>
    </div>

    <!-- Export -->
    <div class="sidebar-section">
      <h3>
        <svg class="section-icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Export XLS / CSV
      </h3>
      <button class="btn btn-primary btn-block btn-sm" id="btn-export-excel" style="margin-bottom:6px;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2 5 5h-5V4zM8 17h8v-2H8v2zm0-4h8v-2H8v2z"/></svg>
        Export Excel complet
      </button>
      <button class="btn btn-outline btn-block btn-sm" id="btn-export-csv">
        Export CSV (vue filtrée)
      </button>
    </div>

    <!-- Stats -->
    <div class="sidebar-section" style="border-bottom:4px solid var(--blue);">
      <h3>
        <svg class="section-icon" viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        Statistiques
      </h3>
      <div id="stats-content"></div>
    </div>

  </div>

  <!-- ===== MAP ===== -->
  <div id="map-container">
    <div id="map"></div>
  </div>

</div>

<!-- ==================== TOAST CONTAINER ==================== -->
<div class="toast-container" id="toast-container"></div>

<!-- ==================== MODAL CLIENT FORM ==================== -->
<div class="modal-overlay" id="client-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="client-modal-title">Nouveau Client</h2>
      <button class="modal-close" id="client-modal-close">×</button>
    </div>
    <div class="modal-body">
      <form id="client-form" autocomplete="off" onsubmit="return false;">
        <input type="hidden" id="cf-id"/>
        <div class="form-grid">
          <div class="form-group form-col-2">
            <label>Nom du client *</label>
            <input type="text" id="cf-nom" placeholder="Fonderie du Nord"/>
          </div>
          <div class="form-group">
            <label>Nom contact</label>
            <input type="text" id="cf-contact" placeholder="Jean Dupont"/>
          </div>
          <div class="form-group">
            <label>Type *</label>
            <select id="cf-type"></select>
          </div>
          <div class="form-group">
            <label>Ville *</label>
            <input type="text" id="cf-ville" placeholder="Lille"/>
          </div>
          <div class="form-group">
            <label>Code postal</label>
            <input type="text" id="cf-cp" placeholder="59000"/>
          </div>
          <div class="form-group">
            <label>Département</label>
            <input type="text" id="cf-dept" placeholder="Nord"/>
          </div>
          <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" id="cf-tel" placeholder="03 20 00 00 00"/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="cf-email" placeholder="contact@exemple.fr"/>
          </div>
          <div class="form-group">

function getMarkerSize(ca){

function saveToStorage(){

    localStorage.setItem(STORAGE_KEY_CLIENTS, JSON.stringify(clients));

}

// ============================================================
// UTILITIES
// ============================================================
function getId(){ return 'c' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }
function getCurrentYear(){ return new Date().getFullYear(); }
function getCurrentMonth(){ return new Date().getMonth() + 1; }

function getClientCurrentMonthCA(id){
  const h = caHistory[id] || [];
  const e = h.find(x => x.annee === getCurrentYear() && x.mois === getCurrentMonth());
  return e ? e.ca : 0;
}
function getClientYearCA(id){
  return (caHistory[id]||[]).filter(h => h.annee === getCurrentYear()).reduce((s,h)=>s+h.ca,0);
}
function getClientLast12Months(id){
  const hist = (caHistory[id]||[]).slice().sort((a,b)=>a.annee-b.annee||a.mois-b.mois);
  const mn = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const result = [];
  const now = new Date();
  for(let i=11;i>=0;i--){
    let m = now.getMonth()+1-i, y = now.getFullYear();
    while(m<=0){m+=12;y--;}
    const e = hist.find(h=>h.annee===y&&h.mois===m);
    result.push({label: mn[m-1]+' '+String(y).slice(2), ca: e?e.ca:0});
  }
  return result;
}

function formatCurrency(v){
  if(v >= 1000000) return (v/1000000).toFixed(1)+' M€';
  if(v >= 1000) return Math.round(v).toLocaleString('fr-FR')+' €';
  return (v||0)+' €';
}

function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast '+type;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);
}

// ============================================================
// MAP
// ============================================================
function initMap(){
  map = L.map('map',{center:[46.7,2.5],zoom:6});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);
  markersLayer = L.markerClusterGroup({
    maxClusterRadius:50,
    iconCreateFunction: function(cluster){
      const n = cluster.getChildCount();
      return L.divIcon({
        html:`<div style="background:rgba(27,94,166,0.75);color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.8);">${n}</div>`,
        className:'',iconSize:[36,36]
      });
    }
  });
  markersLayer.addTo(map);
}

// ============================================================
// MARKERS
// ============================================================
function createMarker(client){
  const ca = getClientCurrentMonthCA(client.id);
  const {diameter} = getMarkerSize(ca);
  const color = TYPE_COLORS[client.type] || '#888';
  const isLead = client.type === 'Lead';
  const icon = L.divIcon({
    className:'',
    html:`<div class="client-marker ${isLead?'lead-marker':'filled-marker'}"
      style="width:${diameter}px;height:${diameter}px;background:${isLead?'rgba(255,255,255,0.9)':color};border-color:${isLead?color:'rgba(255,255,255,0.8)'};">
      ${getIconSVG(client.type)}</div>`,
    iconSize:[diameter,diameter],iconAnchor:[diameter/2,diameter/2],popupAnchor:[0,-diameter/2-4]
  });
  const marker = L.marker([client.lat, client.lng],{icon});
  marker._clientId = client.id;
  marker.bindPopup(buildPopupContent(client),{maxWidth:320,minWidth:265});
  marker.on('click',()=>{
    const c = clients.find(x=>x.id===client.id);
    if(c) renderPopup(c, marker);
  });
  return marker;
}

function renderMarkers(){
  markersLayer.clearLayers();
  getFilteredClients().forEach(cl => {
    if(cl.lat && cl.lng) markersLayer.addLayer(createMarker(cl));
  });
}

// ============================================================
// POPUP
// ============================================================
function buildPopupContent(client){
  const caMonth = getClientCurrentMonthCA(client.id);
  const caYear  = getClientYearCA(client.id);
  const color   = TYPE_COLORS[client.type] || '#888';
  const note    = (clientNotes[client.id]||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const mn = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const monthLabel = mn[getCurrentMonth()-1];
  return `<div id="popup-inner-${client.id}">
    <div class="popup-header">${client.nom}</div>
    <div class="popup-type" style="background:${color};">${client.type}</div>
    <div class="popup-sub">📍 ${client.ville}${client.dept?' ('+client.dept+')':''} — ${client.contact}</div>
    ${client.tel?`<div style="font-size:12px;">📞 ${client.tel}</div>`:''}
    ${client.email?`<div style="font-size:12px;">✉️ ${client.email}</div>`:''}
    <div class="popup-ca">${formatCurrency(caMonth)}</div>
    <div class="popup-ca-label">CA ${monthLabel} • Cumulé année: <strong>${formatCurrency(caYear)}</strong></div>
    <div class="popup-chart-container"><canvas id="popup-chart-${client.id}" width="280" height="130"></canvas></div>

    <div class="popup-ca-entry">
      <div class="popup-ca-entry-label">💰 Saisir CA ${monthLabel} (€)</div>
      <div class="popup-ca-entry-row">
        <input type="number" id="popup-ca-input-${client.id}" value="${caMonth}" min="0" step="100"/>
        <button class="popup-save-btn" id="popup-ca-save-${client.id}">Valider</button>
        <span class="popup-saved-msg" id="popup-ca-saved-${client.id}">✓</span>
      </div>
    </div>

    <div class="popup-notes">
      <div class="popup-notes-label">📝 Notes</div>
      <textarea id="popup-note-${client.id}" placeholder="Ajouter une note…">${note}</textarea>
      <div style="display:flex;align-items:center;">
        <button class="popup-save-btn" id="popup-note-save-${client.id}">Sauvegarder</button>
        <span class="popup-saved-msg" id="popup-note-saved-${client.id}">✓ Sauvegardé</span>
      </div>
    </div>

    <div class="popup-action-row">
      <button class="popup-btn popup-btn-edit" id="popup-edit-${client.id}">✏️ Modifier</button>
      <button class="popup-btn popup-btn-delete" id="popup-del-${client.id}">🗑 Supprimer</button>
    </div>
  </div>`;
}

function renderPopup(client, marker){
  setTimeout(()=>{
    // Chart
    const canvas = document.getElementById('popup-chart-'+client.id);
    if(canvas){
      const data = getClientLast12Months(client.id);
      new Chart(canvas.getContext('2d'),{
        type:'bar',
        data:{
          labels:data.map(d=>d.label),
          datasets:[{data:data.map(d=>d.ca),backgroundColor:'rgba(27,94,166,0.55)',borderColor:'#1B5EA6',borderWidth:1,borderRadius:2}]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{font:{size:8},maxRotation:45},grid:{display:false}},
            y:{ticks:{font:{size:9},callback:v=>v>=1000?(v/1000)+'k':v},grid:{color:'#eee'}}
          }
        }
      });
    }

    // CA save
    const caInput = document.getElementById('popup-ca-input-'+client.id);
    const caSave  = document.getElementById('popup-ca-save-'+client.id);
    const caSaved = document.getElementById('popup-ca-saved-'+client.id);
    if(caSave){
      caSave.addEventListener('click',()=>{
        const val = parseFloat(caInput.value)||0;
        const cy = getCurrentYear(), cm = getCurrentMonth();
        if(!caHistory[client.id]) caHistory[client.id]=[];
        const idx = caHistory[client.id].findIndex(h=>h.annee===cy&&h.mois===cm);
        if(idx>=0) caHistory[client.id][idx].ca=val;
        else caHistory[client.id].push({mois:cm,annee:cy,ca:val});
        saveToStorage();
        renderMarkers();
        updateStats();
        caSaved.style.display='inline';
        setTimeout(()=>caSaved.style.display='none',2000);
      });
    }

    // Note save
    const noteArea  = document.getElementById('popup-note-'+client.id);
    const noteSave  = document.getElementById('popup-note-save-'+client.id);
    const noteSaved = document.getElementById('popup-note-saved-'+client.id);
    if(noteSave){
      noteSave.addEventListener('click',()=>{
        clientNotes[client.id] = noteArea.value;
        saveToStorage();
        noteSaved.style.display='inline';
        setTimeout(()=>noteSaved.style.display='none',2000);
      });
    }

    // Edit button
    const editBtn = document.getElementById('popup-edit-'+client.id);
    if(editBtn){
      editBtn.addEventListener('click',()=>{
        marker.closePopup();
        openClientModal(client);
      });
    }

    // Delete button
    const delBtn = document.getElementById('popup-del-'+client.id);
    if(delBtn){
      delBtn.addEventListener('click',()=>{
        if(!confirm(`Supprimer le client "${client.nom}" ? Cette action est irréversible.`)) return;
        clients = clients.filter(c=>c.id!==client.id);
        delete caHistory[client.id];
        delete clientNotes[client.id];
        saveToStorage();
        marker.closePopup();
        renderFilters();
        renderMarkers();
        updateStats();
        showToast(`Client "${client.nom}" supprimé`,'success');
      });
    }
  },100);
}

// ============================================================
// FILTERING + SEARCH
// ============================================================
function getFilteredClients(){
  const q = searchQuery.toLowerCase().trim();
  return clients.filter(cl => {
    if(activeTypeFilter !== 'Tous' && cl.type !== activeTypeFilter) return false;
    if(activeSizeFilter !== 'Tous'){
      const ca = getClientCurrentMonthCA(cl.id);
      if(activeSizeFilter==='Petit' && !(ca<CA_THRESHOLDS.petit)) return false;
      if(activeSizeFilter==='Moyen' && !(ca>=CA_THRESHOLDS.petit && ca<=CA_THRESHOLDS.moyen)) return false;
      if(activeSizeFilter==='Gros'  && !(ca>CA_THRESHOLDS.moyen)) return false;
    }
    if(q){
      const hay = (cl.nom+' '+cl.contact+' '+cl.ville+' '+cl.dept+' '+cl.cp+' '+cl.type).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function getTypeCounts(){
  const c = {Tous:clients.length,Fonte:0,HRSA:0,'Hard Turning':0,Distributeur:0,Lead:0,'New Customer':0};
  clients.forEach(cl=>{ if(c[cl.type]!==undefined) c[cl.type]++; });
  return c;
}
function getSizeCounts(){
  const m = {Petit:0,Moyen:0,Gros:0};
  clients.forEach(cl=>{
    const ca = getClientCurrentMonthCA(cl.id);
    if(ca<CA_THRESHOLDS.petit) m.Petit++;
    else if(ca<=CA_THRESHOLDS.moyen) m.Moyen++;
    else m.Gros++;
  });
  return m;
}

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderFilters(){
  const tc = getTypeCounts();
  const sc = getSizeCounts();

  const typeC = document.getElementById('type-filters');
  typeC.innerHTML='';
  TYPE_LABELS.forEach(lbl=>{
    const chip = document.createElement('span');
    chip.className='chip'+(activeTypeFilter===lbl?' active-type':'');
    chip.textContent=lbl;
    if(lbl!=='Tous'){
      const b=document.createElement('span');
      b.className='badge';b.textContent=tc[lbl]||0;chip.appendChild(b);
    }
    chip.addEventListener('click',()=>{activeTypeFilter=lbl;renderFilters();renderMarkers();updateStats();});
    typeC.appendChild(chip);
  });

  const sizeC = document.getElementById('size-filters');
  sizeC.innerHTML='';
  SIZE_LABELS.forEach(lbl=>{
    const chip = document.createElement('span');
    chip.className='chip'+(activeSizeFilter===lbl?' active-size':'');
    chip.textContent=lbl;
    if(lbl!=='Tous'){
      const b=document.createElement('span');
      b.className='badge';b.textContent=sc[lbl]||0;chip.appendChild(b);
    }
    chip.addEventListener('click',()=>{activeSizeFilter=lbl;renderFilters();renderMarkers();updateStats();});
    sizeC.appendChild(chip);
  });
}

// ============================================================
// STATS
// ============================================================
function updateStats(){
  const filtered = getFilteredClients();
  const cy = getCurrentYear(), cm = getCurrentMonth();
  let caM=0, caY=0;
  const breakdown={};
  filtered.forEach(cl=>{
    caM += getClientCurrentMonthCA(cl.id);
    caY += getClientYearCA(cl.id);
    breakdown[cl.type]=(breakdown[cl.type]||0)+1;
  });
  const mn=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  let html=`
    <div class="stat-row"><span class="stat-label">Clients affichés</span><span class="stat-value blue">${filtered.length}</span></div>
    <div class="stat-row"><span class="stat-label">CA ${mn[cm-1]} (${cy})</span><span class="stat-value">${formatCurrency(caM)}</span></div>
    <div class="stat-row"><span class="stat-label">CA cumulé année</span><span class="stat-value red">${formatCurrency(caY)}</span></div>
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee;">
      <label style="font-size:11px;font-weight:600;color:#888;">Répartition par type</label>`;
  Object.keys(TYPE_COLORS).forEach(type=>{
    const n=breakdown[type]||0;
    if(n>0) html+=`<div class="type-stat"><span><span class="dot" style="background:${TYPE_COLORS[type]};"></span>${type}</span><span style="font-weight:700;">${n}</span></div>`;
  });
  html+=`</div>`;
  document.getElementById('stats-content').innerHTML=html;
}

// ============================================================
// CLIENT FORM MODAL
// ============================================================
function openClientModal(client=null){
  const modal = document.getElementById('client-modal');
  const title = document.getElementById('client-modal-title');
  const delBtn = document.getElementById('btn-delete-client');

  // Populate type select
  const typeSelect = document.getElementById('cf-type');
  typeSelect.innerHTML = Object.keys(TYPE_COLORS).map(t=>`<option value="${t}">${t}</option>`).join('');

  if(client){
    title.textContent = 'Modifier le client';
    document.getElementById('cf-id').value      = client.id;
    document.getElementById('cf-nom').value     = client.nom;
    document.getElementById('cf-contact').value = client.contact||'';
    document.getElementById('cf-type').value    = client.type||'Lead';
    document.getElementById('cf-ville').value   = client.ville||'';
    document.getElementById('cf-cp').value      = client.cp||'';
    document.getElementById('cf-dept').value    = client.dept||'';
    document.getElementById('cf-tel').value     = client.tel||'';
    document.getElementById('cf-email').value   = client.email||'';
    document.getElementById('cf-lat').value     = client.lat||'';
    document.getElementById('cf-lng').value     = client.lng||'';
    delBtn.style.display='inline-flex';
  } else {
    title.textContent = 'Nouveau Client';
    document.getElementById('client-form').reset();
    document.getElementById('cf-id').value = '';
    delBtn.style.display='none';
  }

  document.getElementById('geocode-status').textContent='';
  modal.classList.add('show');
}

function closeClientModal(){
  document.getElementById('client-modal').classList.remove('show');
}

async function geocodeFromForm(){
  const ville = document.getElementById('cf-ville').value.trim();
  const cp    = document.getElementById('cf-cp').value.trim();
  if(!ville && !cp){ showToast('Entrez une ville ou un code postal','error'); return; }
  const status = document.getElementById('geocode-status');
  status.innerHTML = '<span class="spinner"></span> Recherche…';
  const query = encodeURIComponent((cp+' '+ville+' France').trim());
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1&countrycodes=fr`,
      {headers:{'Accept-Language':'fr'}});
    const data = await res.json();
    if(data.length===0){ status.textContent='Adresse introuvable.'; return; }
    document.getElementById('cf-lat').value = parseFloat(data[0].lat).toFixed(5);
    document.getElementById('cf-lng').value = parseFloat(data[0].lon).toFixed(5);
    status.textContent = '✓ Coordonnées trouvées';
  } catch(e){
    status.textContent = 'Erreur de géocodage.';
  }
}

function saveClientFromModal(){
  const nom   = document.getElementById('cf-nom').value.trim();
  const ville = document.getElementById('cf-ville').value.trim();
  if(!nom){ document.getElementById('cf-nom').classList.add('field-error'); return; }
  document.getElementById('cf-nom').classList.remove('field-error');

  const id  = document.getElementById('cf-id').value;
  const lat = parseFloat(document.getElementById('cf-lat').value)||0;
  const lng = parseFloat(document.getElementById('cf-lng').value)||0;

  const data = {
    nom,
    contact: document.getElementById('cf-contact').value.trim(),
    type:    document.getElementById('cf-type').value,
    ville,
    cp:      document.getElementById('cf-cp').value.trim(),
    dept:    document.getElementById('cf-dept').value.trim(),
    tel:     document.getElementById('cf-tel').value.trim(),
    email:   document.getElementById('cf-email').value.trim(),
    lat, lng
  };

  if(id){
    const existing = clients.find(c=>c.id===id);
    if(existing) Object.assign(existing, data);
  } else {
    clients.push({id: getId(), ...data});
  }

  saveToStorage();
  renderFilters();
  renderMarkers();
  updateStats();
  closeClientModal();
  showToast(id ? 'Client modifié' : 'Client ajouté', 'success');
}

function deleteClientFromModal(){
  const id = document.getElementById('cf-id').value;
  if(!id) return;
  const cl = clients.find(c=>c.id===id);
  if(!cl) return;
  if(!confirm(`Supprimer "${cl.nom}" ? Irréversible.`)) return;
  clients = clients.filter(c=>c.id!==id);
  delete caHistory[id];
  delete clientNotes[id];
  saveToStorage();
  renderFilters();
  renderMarkers();
  updateStats();
  closeClientModal();
  showToast(`Client "${cl.nom}" supprimé`,'success');
}

// ============================================================
// NORMALIZATION
// ============================================================
function normalizeType(raw){
  const map = {
    'fonte':'Fonte','casting':'Fonte','fonte/acier':'Fonte',
    'hrsa':'HRSA','high resistance super alloy':'HRSA','alliage':'HRSA',
    'hard turning':'Hard Turning','tournage dur':'Hard Turning','tournage':'Hard Turning',
    'distributeur':'Distributeur','distributor':'Distributeur','distri':'Distributeur',
    'lead':'Lead','prospect':'Lead','prospection':'Lead',
    'new customer':'New Customer','nouveau client':'New Customer','nouveau':'New Customer','new':'New Customer'
  };
  const lower = (raw||'').toLowerCase().trim();
  if(map[lower]) return map[lower];
  for(const key in map){ if(lower.includes(key)) return map[key]; }
  return raw || 'Lead';
}

// XLS IMPORT / EXPORT
// ============================================================
function downloadTemplate(type){
  const wb = XLSX.utils.book_new();
  if(type==='clients'){
    const ws = XLSX.utils.aoa_to_sheet([
      ['Nom client','Nom contact','Ville','Département','Code postal',
       'Type (Fonte/HRSA/Hard Turning/Distributeur/Lead/New Customer)',
       'Téléphone','Email','Latitude','Longitude'],
      ['Exemple Fonderie','Jean Dupont','Lille','Nord','59000','Fonte','03 20 00 00 00','jean@exemple.fr','50.6292','3.0573'],
    ]);
    ws['!cols']=[{wch:25},{wch:20},{wch:18},{wch:18},{wch:10},{wch:55},{wch:18},{wch:28},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'Base Clients');
    XLSX.writeFile(wb,'template_base_clients.xlsx');
  } else {
    const ws = XLSX.utils.aoa_to_sheet([
      ['Nom client','Mois (1-12)','Année','CA (€)'],
      ['Exemple Fonderie','1',getCurrentYear(),'50000'],
    ]);
    ws['!cols']=[{wch:25},{wch:12},{wch:8},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'CA Mensuel');
    XLSX.writeFile(wb,'template_ca_mensuel.xlsx');
  }
  showToast('Template téléchargé','success');
}

function importClientsFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const wb = XLSX.read(e.target.result,{type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let n=0;
      rows.forEach(row=>{
        const nom=(row['Nom client']||'').trim(); if(!nom) return;
        const typeRaw=(row['Type (Fonte/HRSA/Hard Turning/Distributeur/Lead/New Customer)']
          ||row['Type (Fonte/HRSA/Hard Turning/Distributeur/Lead)']||row['Type']||'').trim();
        const ex=clients.find(c=>c.nom.toLowerCase()===nom.toLowerCase());
        if(ex){
          ex.contact=(row['Nom contact']||ex.contact).trim();
          ex.ville=(row['Ville']||ex.ville).trim();
          ex.dept=(row['Département']||ex.dept).trim();
          ex.cp=(row['Code postal']||ex.cp).toString().trim();
          if(typeRaw) ex.type=normalizeType(typeRaw);
          ex.tel=(row['Téléphone']||ex.tel).toString().trim();
          ex.email=(row['Email']||ex.email).trim();
          if(row['Latitude'])  ex.lat=parseFloat(row['Latitude'])||ex.lat;
          if(row['Longitude']) ex.lng=parseFloat(row['Longitude'])||ex.lng;
        } else {
          clients.push({
            id:getId(),nom,
            contact:(row['Nom contact']||'').trim(),
            ville:(row['Ville']||'').trim(),
            dept:(row['Département']||'').trim(),
            cp:(row['Code postal']||'').toString().trim(),
            type:normalizeType(typeRaw||'Lead'),
            tel:(row['Téléphone']||'').toString().trim(),
            email:(row['Email']||'').trim(),
            lat:parseFloat(row['Latitude'])||0,
            lng:parseFloat(row['Longitude'])||0,
          });
        }
        n++;
      });
      saveToStorage(); renderFilters(); renderMarkers(); updateStats();
      showToast(`${n} ligne(s) importée(s) — Base Clients`,'success');
    } catch(err){ showToast('Erreur import: '+err.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function importCAFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const wb = XLSX.read(e.target.result,{type:'array'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let n=0;
      rows.forEach(row=>{
        const nom=(row['Nom client']||'').trim(); if(!nom) return;
        const cl=clients.find(c=>c.nom.toLowerCase()===nom.toLowerCase()); if(!cl) return;
        const mois=parseInt(row['Mois (1-12)']||row['Mois']||0);
        const annee=parseInt(row['Année']||row['Annee']||0);
        const ca=parseFloat(row['CA (€)']||row['CA']||row['CA (euros)']||0);
        if(!mois||!annee) return;
        if(!caHistory[cl.id]) caHistory[cl.id]=[];
        const idx=caHistory[cl.id].findIndex(h=>h.mois===mois&&h.annee===annee);
        if(idx>=0) caHistory[cl.id][idx].ca=ca; else caHistory[cl.id].push({mois,annee,ca});
        n++;
      });
      saveToStorage(); renderMarkers(); updateStats();
      showToast(`${n} ligne(s) importée(s) — CA Mensuel`,'success');
    } catch(err){ showToast('Erreur import: '+err.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcelComplete(){
  if(!clients.length){ showToast('Aucun client à exporter','error'); return; }
  const wb = XLSX.utils.book_new();

  // Feuille 1 : Clients
  const h1=['ID','Nom client','Contact','Ville','Département','CP','Type','Téléphone','Email','Latitude','Longitude'];
  const r1=[h1,...clients.map(cl=>[cl.id,cl.nom,cl.contact,cl.ville,cl.dept,cl.cp,cl.type,cl.tel,cl.email,cl.lat,cl.lng])];
  const ws1=XLSX.utils.aoa_to_sheet(r1);
  ws1['!cols']=[{wch:20},{wch:25},{wch:20},{wch:18},{wch:18},{wch:10},{wch:15},{wch:18},{wch:28},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'Clients');

  // Feuille 2 : CA Historique
  const h2=['Nom client','Mois','Année','CA (€)'];
  const r2=[h2];
  clients.forEach(cl=>(caHistory[cl.id]||[]).forEach(h=>r2.push([cl.nom,h.mois,h.annee,h.ca])));
  const ws2=XLSX.utils.aoa_to_sheet(r2);
  ws2['!cols']=[{wch:25},{wch:8},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'CA Historique');

  // Feuille 3 : Notes
  const h3=['Nom client','Note'];
  const r3=[h3,...clients.filter(cl=>clientNotes[cl.id]).map(cl=>[cl.nom,clientNotes[cl.id]])];
  const ws3=XLSX.utils.aoa_to_sheet(r3);
  ws3['!cols']=[{wch:25},{wch:60}];
  XLSX.utils.book_append_sheet(wb,ws3,'Notes');

  XLSX.writeFile(wb,'spk_clients_complet.xlsx');
  showToast('Export Excel complet (3 feuilles) téléchargé','success');
}

function exportCSV(){
  const filtered = getFilteredClients();
  if(!filtered.length){ showToast('Aucun client à exporter','error'); return; }
  const h=['Nom client','Contact','Ville','Département','CP','Type','Téléphone','Email','CA mois','CA année','Latitude','Longitude'];
  let csv='﻿'+h.join(';')+'\n';
  filtered.forEach(cl=>{
    csv+=[esc(cl.nom),esc(cl.contact),esc(cl.ville),esc(cl.dept),esc(cl.cp),esc(cl.type),
      esc(cl.tel),esc(cl.email),getClientCurrentMonthCA(cl.id),getClientYearCA(cl.id),cl.lat,cl.lng].join(';')+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='spk_clients_filtres.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`${filtered.length} client(s) exporté(s) en CSV`,'success');
}

function esc(v){ return '"'+String(v||'').replace(/"/g,'""')+'"'; }

// ============================================================
// DRAG & DROP
// ============================================================
function setupDragDrop(){
  ['upload-clients','upload-ca'].forEach(id=>{
    const z=document.getElementById(id);
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover');});
    z.addEventListener('dragleave',()=>z.classList.remove('dragover'));
  });
}

// ============================================================
// INIT
// ============================================================
function init(){
  loadFromStorage();
  if(!localStorage.getItem(STORAGE_KEY_INIT)) generateDemoData();

  initMap();
  renderFilters();
  renderMarkers();
  updateStats();
  setupDragDrop();

  // Templates
  document.getElementById('btn-tpl-clients').addEventListener('click',()=>downloadTemplate('clients'));
  document.getElementById('btn-tpl-ca').addEventListener('click',()=>downloadTemplate('ca'));

  // Import
  document.getElementById('file-clients').addEventListener('change',e=>{
    if(e.target.files.length){ importClientsFile(e.target.files[0]); e.target.value=''; }
  });
  document.getElementById('file-ca').addEventListener('change',e=>{
    if(e.target.files.length){ importCAFile(e.target.files[0]); e.target.value=''; }
  });

  // Export
  document.getElementById('btn-export-csv').addEventListener('click',exportCSV);
  document.getElementById('btn-export-excel').addEventListener('click',exportExcelComplete);

  // Search
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  searchInput.addEventListener('input',()=>{
    searchQuery=searchInput.value;
    searchClear.style.display=searchQuery?'block':'none';
    renderMarkers(); updateStats();
  });
  searchClear.addEventListener('click',()=>{
    searchQuery=''; searchInput.value=''; searchClear.style.display='none';
    renderMarkers(); updateStats();
  });

  // Add client button
  document.getElementById('btn-add-client').addEventListener('click',()=>openClientModal());

  // Modal close
  document.getElementById('client-modal-close').addEventListener('click',closeClientModal);
  document.getElementById('btn-cancel-client').addEventListener('click',closeClientModal);
  document.getElementById('client-modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('client-modal')) closeClientModal();
  });

  // Modal save & delete
  document.getElementById('btn-save-client').addEventListener('click',saveClientFromModal);
  document.getElementById('btn-delete-client').addEventListener('click',deleteClientFromModal);

  // Geocode
  document.getElementById('btn-geocode').addEventListener('click',geocodeFromForm);

  // Reset filters btn
  const resetBtn = document.createElement('button');
  resetBtn.className='btn btn-sm';
  resetBtn.style.cssText='margin-top:8px;font-size:11px;color:#999;background:none;border:1px solid #ddd;';
  resetBtn.textContent='✕ Réinitialiser filtres';
  resetBtn.addEventListener('click',()=>{
    activeTypeFilter='Tous'; activeSizeFilter='Tous';
    renderFilters(); renderMarkers(); updateStats();
  });
  document.getElementById('type-filters').parentElement.parentElement.appendChild(resetBtn);
}

document.addEventListener('DOMContentLoaded',init);

})();
</script>
